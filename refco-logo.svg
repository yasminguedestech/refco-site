<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Fundo transparente -->

  <!-- Círculo externo -->
  <circle cx="250" cy="250" r="228" fill="none" stroke="#5B2D8E" stroke-width="4"/>
  <!-- Círculo interno -->
  <circle cx="250" cy="250" r="212" fill="none" stroke="#5B2D8E" stroke-width="2"/>

  <!-- Texto superior curvado: REF. CREATE. GO. -->
  <path id="topArc" d="M 48,250 A 202,202 0 0,1 452,250" fill="none"/>
  <text font-family="'Trebuchet MS', 'Arial', sans-serif" font-size="19" fill="#5B2D8E" letter-spacing="8" font-weight="700">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">REF. CREATE. GO.</textPath>
  </text>

  <!-- Texto inferior curvado: REF. CREATE. GO. -->
  <path id="botArc" d="M 56,268 A 202,202 0 0,0 444,268" fill="none"/>
  <text font-family="'Trebuchet MS', 'Arial', sans-serif" font-size="19" fill="#5B2D8E" letter-spacing="8" font-weight="700">
    <textPath href="#botArc" startOffset="50%" text-anchor="middle">REF. CREATE. GO.</textPath>
  </text>

  <!-- RefCo topo — italic serif -->
  <text x="250" y="168" font-family="Georgia, 'Palatino Linotype', serif" font-size="50" font-weight="700" fill="#3D1580" text-anchor="middle" font-style="italic">RefCo</text>

  <!-- Parêntese esquerdo -->
  <path d="M 148,190 C 116,218 116,272 148,300" fill="none" stroke="#5B2D8E" stroke-width="10" stroke-linecap="round"/>
  <!-- Parêntese direito -->
  <path d="M 352,190 C 384,218 384,272 352,300" fill="none" stroke="#5B2D8E" stroke-width="10" stroke-linecap="round"/>

  <!-- R central — bold -->
  <text x="252" y="332" font-family="'Arial Black', 'Arial Bold', Impact, sans-serif" font-size="168" font-weight="900" fill="#3D1580" text-anchor="middle">R</text>

  <!-- Dois arcos mini no topo -->
  <path d="M 207,160 Q 220,147 233,158" fill="none" stroke="#5B2D8E" stroke-width="8" stroke-linecap="round"/>
  <path d="M 244,157 Q 257,144 270,155" fill="none" stroke="#5B2D8E" stroke-width="8" stroke-linecap="round"/>

  <!-- Tick superior direito -->
  <path d="M 337,166 Q 352,157 355,172" fill="none" stroke="#5B2D8E" stroke-width="7" stroke-linecap="round"/>

  <!-- Curva inferior esquerda -->
  <path d="M 162,316 Q 150,332 161,344" fill="none" stroke="#5B2D8E" stroke-width="7.5" stroke-linecap="round"/>

  <!-- Curva inferior direita -->
  <path d="M 326,318 Q 347,327 343,343" fill="none" stroke="#5B2D8E" stroke-width="7.5" stroke-linecap="round"/>

  <!-- RefCo base — italic serif -->
  <text x="250" y="395" font-family="Georgia, 'Palatino Linotype', serif" font-size="50" font-weight="700" fill="#3D1580" text-anchor="middle" font-style="italic">RefCo</text>
</svg>
